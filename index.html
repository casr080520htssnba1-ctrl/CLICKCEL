<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLICK CELL - Tienda de Smartphones</title>
    <style>
        /* =========================================
           VARIABLES Y CONFIGURACIÓN BASE
        ========================================= */
        :root {
            --bg-color: #f5f5f7;
            --surface-color: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #000000;
            --border-radius: 16px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 16px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #e5e5e5; /* Fondo oscuro para simular el móvil en escritorio */
            display: flex;
            justify-content: center;
        }

        /* Contenedor principal simulando la pantalla del móvil */
        #app-container {
            width: 100%;
            max-width: 480px; /* Tamaño máximo tipo smartphone */
            min-height: 100vh;
            background-color: var(--bg-color);
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* =========================================
           HEADER Y BUSCADOR
        ========================================= */
        header {
            background-color: var(--surface-color);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .search-container input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            background-color: var(--bg-color);
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);
        }

        .search-container input:focus {
            box-shadow: inset 0 0 0 2px var(--text-secondary);
        }

        /* =========================================
           FILTROS (MARCAS)
        ========================================= */
        .filters {
            display: flex;
            gap: 10px;
            padding: 0 20px;
            margin: 15px 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #ddd;
            background-color: var(--surface-color);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }

        .filter-btn.active {
            background-color: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        /* =========================================
           CATÁLOGO DE PRODUCTOS (GRID)
        ========================================= */
        main {
            flex-grow: 1;
            padding: 10px 20px 80px 20px; /* Espacio inferior para el menú */
            overflow-y: auto;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .product-card {
            background-color: var(--surface-color);
            border-radius: var(--border-radius);
            padding: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        /* Estilo preparado para imágenes locales */
        .product-img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            background-color: #f0f0f0; /* Color de fondo mientras no hay imagen */
            border-radius: 12px;
            margin-bottom: 12px;
            position: relative;
        }

        /* Placeholder visual si la imagen local falla o no existe aún */
        .product-img::after {
            content: "Sin Imagen";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
            color: #aaa;
            font-size: 12px;
            border-radius: 12px;
        }

        .product-brand {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1.2;
            flex-grow: 1;
        }

        .product-desc {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .btn-add {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .btn-add:active {
            transform: scale(0.9);
        }

        /* =========================================
           VISTA DEL CARRITO
        ========================================= */
        #cart-view {
            display: none; /* Oculto por defecto */
        }

        .cart-header {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .cart-item {
            display: flex;
            background: var(--surface-color);
            padding: 10px;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            align-items: center;
        }

        .cart-item img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background-color: #f0f0f0;
            border-radius: 8px;
            margin-right: 15px;
        }

        .cart-item-info {
            flex-grow: 1;
        }

        .cart-item-title {
            font-size: 14px;
            font-weight: 600;
        }

        .cart-item-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .cart-item-remove {
            color: #ff3b30;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 5px 10px;
        }

        .cart-summary {
            margin-top: 30px;
            background: var(--surface-color);
            padding: 20px;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .btn-checkout {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .empty-cart-msg {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 50px;
        }

        /* =========================================
           MENÚ DE NAVEGACIÓN INFERIOR
        ========================================= */
        nav.bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            position: relative;
        }

        .nav-item.active {
            color: var(--accent-color);
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background-color: #ff3b30;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div id="app-container">
    
    <header id="main-header">
        <div class="header-top">
            <div class="logo">CLICK CELL.</div>
        </div>
        <div class="search-container" id="search-container">
            <input type="text" id="searchInput" placeholder="Buscar smartphones...">
        </div>
    </header>

    <main id="home-view">
        <div class="filters">
            <button class="filter-btn active" data-brand="Todos">Todos</button>
            <button class="filter-btn" data-brand="Apple">Apple</button>
            <button class="filter-btn" data-brand="Samsung">Samsung</button>
        </div>

        <div class="product-grid" id="productGrid">
            </div>
    </main>

    <main id="cart-view">
        <h2 class="cart-header">Tu Carrito</h2>
        <div class="cart-items" id="cartItems">
            </div>
        
        <div class="cart-summary" id="cartSummary" style="display: none;">
            <div class="summary-row">
                <span>Total</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="btn-checkout" onclick="alert('Funcionalidad de pago simulada.')">Proceder al pago</button>
        </div>
        <div id="emptyCart" class="empty-cart-msg">Tu carrito está vacío.</div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')">
            <span class="nav-icon">🏠</span>
            <span>Inicio</span>
        </div>
        <div class="nav-item" onclick="switchTab('cart')">
            <span class="nav-icon">🛒</span>
            <span>Carrito</span>
            <span class="cart-badge" id="cartBadge">0</span>
        </div>
    </nav>

</div>

<script>
    /* =========================================
       DATOS SIMULADOS (20 PRODUCTOS)
    ========================================= */
    const products = [
        { id: 1, name: 'iPhone 15 Pro Max', brand: 'Apple', price: 1199, desc: 'Diseño en titanio, chip A17 Pro, cámara 5x.', image: '15 PMAX.png' },
        { id: 2, name: 'iPhone 15 Pro', brand: 'Apple', price: 999, desc: 'Titanio aeroespacial y rendimiento profesional.', image: '15PRO.png' },
        { id: 3, name: 'iPhone 15', brand: 'Apple', price: 799, desc: 'Dynamic Island y cámara principal de 48 MP.', image: '15.jpg' },
        { id: 4, name: 'iPhone 14 Pro Max', brand: 'Apple', price: 1099, desc: 'Pantalla Super Retina XDR de 6.7 pulgadas.', image: '14PROMAX.png' },
        { id: 5, name: 'iPhone 14 Pro', brand: 'Apple', price: 899, desc: 'Chip A16 Bionic y sistema de cámaras Pro.', image: '14PRO.png' },
        { id: 6, name: 'iPhone 14', brand: 'Apple', price: 699, desc: 'Gran autonomía y sistema de dos cámaras.', image: '14.png' },
        { id: 7, name: 'iPhone 13', brand: 'Apple', price: 599, desc: 'Chip A15 Bionic, diseño resistente y 5G.', image: '13.png' },
        { id: 8, name: 'iPhone 13 mini', brand: 'Apple', price: 499, desc: 'Potencia compacta en 5.4 pulgadas.', image: '13MINI.png' },
        { id: 9, name: 'iPhone 12', brand: 'Apple', price: 399, desc: 'Velocidad 5G y pantalla OLED.', image: '12.png' },
        { id: 10, name: 'iPhone SE (3ra Gen)', brand: 'Apple', price: 429, desc: 'Diseño clásico con el potente chip A15.', image: 'IP SE 3GEN.png' },
        
        { id: 11, name: 'Galaxy S24 Ultra', brand: 'Samsung', price: 1299, desc: 'Marco de titanio, Galaxy AI y S Pen.', image: '24ULTRA.jpg' },
        { id: 12, name: 'Galaxy S24+', brand: 'Samsung', price: 999, desc: 'Pantalla QHD+ y batería inteligente.', image: '24+.jpg' },
        { id: 13, name: 'Galaxy S24', brand: 'Samsung', price: 799, desc: 'Potencia compacta y traducciones con AI.', image: 'S24.png' },
        { id: 14, name: 'Galaxy S23 Ultra', brand: 'Samsung', price: 999, desc: 'Cámara de 200MP y Nightography.', image: '23ULTRA.png' },
        { id: 15, name: 'Galaxy S23 FE', brand: 'Samsung', price: 599, desc: 'Lo épico a tu alcance con gran rendimiento.', image: 'S23FE.jpg' },
        { id: 16, name: 'Galaxy Z Fold 5', brand: 'Samsung', price: 1799, desc: 'Plegable premium, multitarea extrema.', image: 'ZFOLD5.jpg' },
        { id: 17, name: 'Galaxy Z Flip 5', brand: 'Samsung', price: 999, desc: 'Diseño de bolsillo con pantalla externa.', image: 'FLIP5.jpg' },
        { id: 18, name: 'Galaxy A54', brand: 'Samsung', price: 399, desc: 'Cámara OIS, diseño elegante y resistencia IP67.', image: 'A54.png' },
        { id: 19, name: 'Galaxy A34', brand: 'Samsung', price: 299, desc: 'Pantalla Super AMOLED de 120Hz.', image: 'A34.png' },
        { id: 20, name: 'Galaxy M54', brand: 'Samsung', price: 349, desc: 'Batería masiva de 6000 mAh.', image: 'M54.jpg' }
    ];

    /* =========================================
       ESTADO DE LA APLICACIÓN
    ========================================= */
    let cart = [];
    let currentFilter = 'Todos';
    let searchQuery = '';

    /* =========================================
       REFERENCIAS AL DOM
    ========================================= */
    const productGrid = document.getElementById('productGrid');
    const searchInput = document.getElementById('searchInput');
    const filterBtns = document.querySelectorAll('.filter-btn');
    
    // Elementos del carrito
    const cartItemsContainer = document.getElementById('cartItems');
    const cartSummary = document.getElementById('cartSummary');
    const emptyCartMsg = document.getElementById('emptyCart');
    const cartTotalEl = document.getElementById('cartTotal');
    const cartBadge = document.getElementById('cartBadge');

    // Vistas
    const homeView = document.getElementById('home-view');
    const cartView = document.getElementById('cart-view');
    const searchContainer = document.getElementById('search-container');
    const navItems = document.querySelectorAll('.nav-item');

    /* =========================================
       FUNCIONES DE RENDERIZADO
    ========================================= */
    function renderProducts() {
        productGrid.innerHTML = '';

        // Filtrar productos
        const filteredProducts = products.filter(product => {
            const matchesBrand = currentFilter === 'Todos' || product.brand === currentFilter;
            const matchesSearch = product.name.toLowerCase().includes(searchQuery.toLowerCase());
            return matchesBrand && matchesSearch;
        });

        if (filteredProducts.length === 0) {
            productGrid.innerHTML = '<p style="grid-column: span 2; text-align: center; color: #888; margin-top: 20px;">No se encontraron productos.</p>';
            return;
        }

        // Crear tarjetas
        filteredProducts.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${product.image}" alt="${product.name}" class="product-img" onerror="this.style.opacity='0'">
                
                <span class="product-brand">${product.brand}</span>
                <h3 class="product-name">${product.name}</h3>
                <p class="product-desc">${product.desc}</p>
                <div class="product-bottom">
                    <span class="product-price">$${product.price}</span>
                    <button class="btn-add" onclick="addToCart(${product.id})">+</button>
                </div>
            `;
            productGrid.appendChild(card);
        });
    }

    function renderCart() {
        cartItemsContainer.innerHTML = '';
        let total = 0;

        if (cart.length === 0) {
            emptyCartMsg.style.display = 'block';
            cartSummary.style.display = 'none';
        } else {
            emptyCartMsg.style.display = 'none';
            cartSummary.style.display = 'block';

            cart.forEach((item, index) => {
                total += item.price;
                const cartEl = document.createElement('div');
                cartEl.className = 'cart-item';
                cartEl.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" onerror="this.style.opacity='0'">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-price">$${item.price}</div>
                    </div>
                    <button class="cart-item-remove" onclick="removeFromCart(${index})">×</button>
                `;
                cartItemsContainer.appendChild(cartEl);
            });
        }

        cartTotalEl.innerText = `$${total.toFixed(2)}`;
        
        // Actualizar contador (Badge)
        if (cart.length > 0) {
            cartBadge.innerText = cart.length;
            cartBadge.style.display = 'block';
        } else {
            cartBadge.style.display = 'none';
        }
    }

    /* =========================================
       LOGICA DE NEGOCIO (EVENTOS)
    ========================================= */
    
    // Agregar al carrito
    window.addToCart = (productId) => {
        const product = products.find(p => p.id === productId);
        if (product) {
            cart.push(product);
            renderCart();
            
            // Pequeña animación visual de feedback (opcional)
            alert(`Añadido al carrito: ${product.name}`);
        }
    };

    // Quitar del carrito
    window.removeFromCart = (index) => {
        cart.splice(index, 1);
        renderCart();
    };

    // Búsqueda
    searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderProducts();
    });

    // Filtros de marca
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            // Actualizar botones
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Filtrar data
            currentFilter = btn.getAttribute('data-brand');
            renderProducts();
        });
    });

    // Navegación Simulada (Tabs)
    window.switchTab = (tab) => {
        // Actualizar UI de botones nav
        navItems.forEach(item => item.classList.remove('active'));
        
        if (tab === 'home') {
            navItems[0].classList.add('active');
            homeView.style.display = 'block';
            searchContainer.style.display = 'block';
            cartView.style.display = 'none';
        } else {
            navItems[1].classList.add('active');
            homeView.style.display = 'none';
            searchContainer.style.display = 'none';
            cartView.style.display = 'block';
            renderCart(); // Asegurar renderizado correcto al entrar
        }
    };

    /* =========================================
       INICIALIZACIÓN
    ========================================= */
    renderProducts();
    renderCart();

</script>
</body>
</html>
